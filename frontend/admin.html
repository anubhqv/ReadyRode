<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadyRoad Admin - Control Tower</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <nav>
        <strong>ReadyRide ADMIN</strong>
        <div>
            <a href="index.html">View Site</a>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h1>Admin Dashboard</h1>

        <section>
            <h3>+ Add New Vehicle to Fleet</h3>
            <form id="addCarForm">
                <input type="text" name="make" placeholder="Make (e.g., Tesla)" required>
                <input type="text" name="model" placeholder="Model (e.g., Model 3)" required>
                <input type="number" name="year" placeholder="Year" required>
                <input type="number" name="pricePerDay" placeholder="Price Per Day ($)" required>
                <input type="text" name="licensePlate" placeholder="License Plate" required>
                <input type="text" name="image" placeholder="Car Image URL" required>
                <select name="category">
                    <option value="Economy">Economy</option>
                    <option value="Luxury">Luxury</option>
                    <option value="SUV">SUV</option>
                </select>
                <button type="submit">Add Car to Fleet</button>
            </form>
        </section>

        <section>
            <h3>Current Fleet</h3>
            <table>
                <thead>
                    <tr>
                        <th>Vehicle</th>
                        <th>Price/Day</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="fleetTable"></tbody>
            </table>
        </section>

        <section>
            <h3>All Customer Bookings</h3>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Car</th>
                        <th>Dates</th>
                        <th>Revenue</th>
                    </tr>
                </thead>
                <tbody id="allBookingsTable"></tbody>
            </table>
        </section>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
