<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking | ReadyRide</title>
    <link rel="stylesheet" href="css/booking.css">
</head>

<body>

    <header>
        <strong onclick="window.location.href='index.html'" style="cursor:pointer;">ReadyRide</strong>
    </header>

    <h2>Confirm Your Booking</h2>

    <div class="booking-container">
        <div id="carSummary">
            <p>Loading premium vehicle details...</p>
        </div>

        <form id="bookingForm">
            <label>Pickup Location</label>
            <select id="pickupLocation">
                <option value="City Airport">City Airport (Terminal 1)</option>
                <option value="Downtown Station">Downtown Main Station</option>
                <option value="Main Mall Office">ReadyRide Mall Office</option>
            </select>

            <label>Start Date</label>
            <input type="date" id="startDate" required>

            <label>End Date</label>
            <input type="date" id="endDate" required>

            <div id="price">Total Price: $0</div>

            <button type="submit" id="confirmBtn">Confirm My Ride</button>
            <p style="font-size: 11px; text-align: center; margin-top: 15px; color: #6b7280;">
                By clicking confirm, you agree to our 24h cancellation policy.
            </p>
        </form>
    </div>

    <script src="js/booking.js"></script>
</body>

</html>
