<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ReadyRoad</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

    <nav>
        <strong onclick="window.location.href='index.html'">ReadyRide</strong>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2>Account Overview</h2>
        <div class="profile-card">
            <div class="avatar" id="userInitial">U</div>
            <div class="user-details" id="userFields">
                <p>Loading profile...</p>
            </div>
        </div>

        <h2>My Rental History</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Car Model</th>
                        <th>Rental Period</th>
                        <th>Total Price</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookingList">
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>

</html>
