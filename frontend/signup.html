<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ReadyRide</title>
    <link rel="stylesheet" href="css/signup.css">
</head>

<body>
    <div class="signup-card">
        <h1>Ready<span>Ride</span></h1>
        <p>Join us and start your premium journey</p>

        <form id="signupForm">
            <div>
                <label>First Name</label>
                <input type="text" name="firstName" placeholder="John" required>
            </div>
            <div>
                <label>Last Name</label>
                <input type="text" name="lastName" placeholder="Doe" required>
            </div>
            <div class="full-width">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="full-width">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 8 characters" minlength="8" required>
            </div>
            <div>
                <label>Phone Number</label>
                <input type="text" name="phoneNumber" placeholder="+91..." required>
            </div>
            <div>
                <label>Driver's License</label>
                <input type="text" name="driversLicense" placeholder="ABC-12345" required>
            </div>

            <button type="submit" id="submitBtn">Create Account</button>

            <div class="footer-text">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <script src="js/signup.js"></script>
</body>

</html>
